        * {

            font-family: 'Poppins', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            overflow-x: hidden;
            padding-bottom: 20px;
        }

        .mobile-frame { min-height: 100vh; display: flex; flex-direction: column; }

        /* --- Header & Top Bar --- */
        .status-bar { display: flex; justify-content: space-between; align-items: center; padding: 14px 24px 10px; font-size: 14px; font-weight: 600; z-index: 10; }
        .status-icons { display: flex; gap: 6px; align-items: center; }
        
        header { display: flex; justify-content: space-between; align-items: center; padding: 10px 20px; margin-bottom: 10px; }
        .header-icon { background: none; border: none; color: white; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        
        .desktop-nav { display: none; }
        
        .logo-container { display: flex; flex-direction: column; align-items: center; }
        .logo-container img { height: 36px; width: auto; object-fit: contain; display: block; }
        .logo { display: flex; align-items: center; gap: 6px; font-size: 18px; font-weight: 700; font-style: italic; }
        .star-icon { color: #FF9D00; font-size: 22px; filter: drop-shadow(0 0 8px rgba(255, 157, 0, 0.8)); }
        .header-right { display: flex; gap: 16px; align-items: center; }

        /* --- Video Player Area --- */
        .player-container {
            width: 100%;
            aspect-ratio: 16/9;
            background: #000;
            position: relative;
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
        }
        #video-target {
            width: 100%;
            height: 100%;
            position: absolute;
            inset: 0;
        }
        #video-target .plyr, #video-target .plyr__video-wrapper {
            width: 100%;
            height: 100%;
        }
        #video-target video, #video-target iframe {
            width: 100%;
            height: 100%;
            object-fit: contain;
            border: none;
        }
        
        /* Custom Controls Overlay */
        .custom-controls {
            position: absolute;
            inset: 0;
            display: none; /* hidden by default, shown via JS if video element */
            flex-direction: column;
            justify-content: space-between;
            background: linear-gradient(to bottom, rgba(0,0,0,0.7) 0%, transparent 20%, transparent 80%, rgba(0,0,0,0.8) 100%);
            z-index: 10;
        }
        .controls-top {
            display: flex;
            justify-content: space-between;
            padding: 16px;
        }
        .controls-center {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 40px;
        }
        .play-pause-btn {
            width: 64px; height: 64px;
            border: 2px solid white; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            background: rgba(0,0,0,0.4); -webkit-backdrop-filter: blur(4px); backdrop-filter: blur(4px);
            cursor: pointer;
            transition: transform 0.1s;
        }
        .play-pause-btn:active { transform: scale(0.95); }
        .skip-btn {
            background: none; border: none; color: white; cursor: pointer;
            display: flex; flex-direction: column; align-items: center;
            font-size: 10px; font-weight: bold; position: relative;
        }
        .skip-btn svg { margin-bottom: -14px; }
        
        .controls-bottom {
            display: flex; align-items: center; padding: 12px 16px; gap: 12px;
        }
        .time-text { font-size: 12px; font-weight: 500; width: 40px; text-align: center; }
        
        /* Progress Bar */
        input[type=range] {
            -webkit--webkit-appearance: none; appearance: none;
            width: 100%;
            height: 4px;
            background: #333;
            border-radius: 2px;
            outline: none;
            cursor: pointer;
            transition: height 0.2s ease;
        }
        input[type=range]:hover {
            height: 8px;
        }
        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 16px;
            height: 16px;
            background: var(--accent-red);
            border-radius: 50%;
            cursor: pointer;
            opacity: 0;
            transform: scale(0.5);
            transition: opacity 0.2s ease, transform 0.2s ease;
        }
        input[type=range]:hover::-webkit-slider-thumb {
            opacity: 1;
            transform: scale(1);
        }

        .dimmable-content {
            transition: opacity 0.5s ease;
        }

        /* --- Episode Metadata --- */
        .metadata-section { padding: 20px; }
        .subheading { color: var(--accent-red); font-size: 12px; font-weight: 700; text-transform: uppercase; margin-bottom: 6px; letter-spacing: 0.5px; }
        .title-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
        .ep-title { font-size: 26px; font-weight: 800; }
        .actions-row { display: flex; gap: 16px; }
        .action-item { display: flex; flex-direction: column; align-items: center; gap: 4px; color: white; font-size: 10px; font-weight: 500; cursor: pointer; }
        
        .badges-row { display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; }
        .badge { background: #111; border: 1px solid #333; padding: 4px 8px; border-radius: 6px; font-size: 11px; font-weight: 600; color: #ddd; }
        
        .synopsis { font-size: 13px; color: #aaa; line-height: 1.5; margin-bottom: 20px; }
        .divider { width: 100%; height: 1px; background: var(--border-color); margin-bottom: 20px; }

        /* --- Server Selection --- */
        .server-selector { display: flex; gap: 10px; padding: 12px 20px; background: #0A0C10; justify-content: center; flex-wrap: wrap; }
        .server-btn { background: var(--btn-grey); color: white; border: 1px solid var(--border-color); padding: 8px 16px; border-radius: 8px; font-size: 12px; font-weight: 600; cursor: pointer; transition: all 0.2s; }
        .server-btn.active { background: var(--accent-red); border-color: var(--accent-red); }
        .server-btn:hover:not(.active) { background: rgba(255,255,255,0.1); }

        /* --- Next Episode Card --- */
        .next-ep-header { display: flex; align-items: center; font-size: 16px; font-weight: 700; border-left: 3px solid var(--accent-red); padding-left: 8px; margin-bottom: 16px; margin-left: 20px; line-height: 1; }
        
        .next-ep-card {
            display: flex; gap: 16px; align-items: center;
            margin: 0 20px 24px; padding-bottom: 20px;
            border-bottom: 1px solid var(--border-color);
            cursor: pointer;
        }
        .next-ep-thumb {
            width: 120px; height: 70px; border-radius: 8px;
            position: relative; overflow: hidden; flex-shrink: 0;
        }
        .next-ep-thumb img { width: 100%; height: 100%; object-fit: cover; }
        .next-ep-play {
            position: absolute; inset: 0; background: rgba(0,0,0,0.4);
            display: flex; align-items: center; justify-content: center;
        }
        .next-ep-details { flex: 1; display: flex; flex-direction: column; justify-content: center; }
        .next-ep-sub { color: var(--accent-red); font-size: 10px; font-weight: bold; margin-bottom: 2px; }
        .next-ep-title { font-size: 14px; font-weight: 700; margin-bottom: 4px; }
        .next-ep-desc { font-size: 11px; color: #888; display: -webkit-box; -webkit--webkit-line-clamp: 2; line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; margin-bottom: 4px; }
        .next-ep-dur { font-size: 11px; color: #666; }
        .next-ep-arrow { color: #888; }

        /* --- Bottom Action Buttons --- */
        .bottom-actions {
            padding: 0 20px 20px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-top: auto;
        }
        .btn-action {
            width: 100%; padding: 16px; border-radius: 12px;

        .btn-grey { background: rgba(255,255,255,0.05); color: white; border: 1px solid rgba(255,255,255,0.1); }

                    DOWNLOAD VIDEO

                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/></svg>

                </button>

                    NEXT EPISODE
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor" stroke="currentColor" stroke-width="1"><polygon points="5 4 15 12 5 20 5 4"/><line x1="19" y1="5" x2="19" y2="19" stroke-width="3"/></svg>

    <script src="https://cdn.jsdelivr.net/npm/p2p-media-loader-hlsjs@latest/build/p2p-media-loader-hlsjs.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.49.4/dist/umd/supabase.js"></script>
    <script src="supabase-config.js?v=1781308664462"></script>
    
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const urlParams = new URLSearchParams(window.location.search);
            const id = urlParams.get('id');
            const epIndexStr = urlParams.get('ep'); 
            
            if (id) {
                document.getElementById('back-btn').onclick = (e) => {
                    e.preventDefault();
                    window.location.href = `watch.html?id=${id}`;
                };
            }

            if (!id || !supabase) {
                document.getElementById('video-target').innerHTML = '<div style="color:#e57373; position:absolute; top:50%; left:50%; transform:translate(-50%,-50%);">Content not found.</div>';
                return;
            }

            // Optimize for 10,000+ viewers: Cache DB request locally to heavily reduce Supabase read spikes
            const cacheKey = `content_cache_${id}`;
            let data = null;
            try {
                const cached = sessionStorage.getItem(cacheKey);
                if (cached) {
                    const parsed = JSON.parse(cached);
                    if (Date.now() - parsed.timestamp < 10 * 60 * 1000) { // 10 minute cache TTL
                        data = parsed.data;
                    }
                }
            } catch(e) {}

            if (!data) {
                const { data: dbData, error } = await supabase.from('content').select('*').eq('id', id).single();
                if (error || !dbData) {
                    document.getElementById('video-target').innerHTML = '<div style="color:#e57373; position:absolute; top:50%; left:50%; transform:translate(-50%,-50%);">Content not found.</div>';
                    return;
                }
                data = dbData;
                try { sessionStorage.setItem(cacheKey, JSON.stringify({ timestamp: Date.now(), data })); } catch(e) {}
            }

            let serverLinks = [];
            let downloadLink = null;
            let displayTitle = data.title;
            let subheading = data.type === 'Series' ? `${data.title.toUpperCase()}` : 'MOVIE';
            let description = data.description || 'No description available.';
            let isSeries = data.type === 'Series';

            let episodes = [];
            try { episodes = typeof data.episodes === 'string' ? JSON.parse(data.episodes) : data.episodes; } catch(e) {}
            if(!episodes) episodes = [];

            let currentEpIndex = null;

            if (isSeries && epIndexStr !== null && episodes[epIndexStr]) {
                currentEpIndex = parseInt(epIndexStr, 10);
                const epObj = episodes[currentEpIndex];
                
                serverLinks = [
                    epObj.embedCode || epObj.link || epObj.videoUrl || '',
                    epObj.embedCode2 || epObj.link2 || epObj.videoUrl2 || epObj.server2 || '',
                    epObj.embedCode3 || epObj.link3 || epObj.videoUrl3 || epObj.server3 || ''
                ];
                
                displayTitle = epObj.title || `Episode ${currentEpIndex + 1}`;
                downloadLink = epObj.downloadLink;
                subheading = `${data.title.toUpperCase()} - S1 : E${currentEpIndex + 1}`;
                description = epObj.desc || description;

                // Setup Next Episode
                if (episodes[currentEpIndex + 1]) {
                    const nextObj = episodes[currentEpIndex + 1];
                    document.getElementById('next-ep-container').style.display = 'block';
                    document.getElementById('next-ep-sub').textContent = `S1 : E${currentEpIndex + 2}`;
                    document.getElementById('next-ep-title').textContent = nextObj.title || `Episode ${currentEpIndex + 2}`;
                    document.getElementById('next-ep-desc').textContent = nextObj.desc || 'Continue watching next episode.';
                    document.getElementById('next-ep-dur').textContent = nextObj.duration || '45m';
                    document.getElementById('next-ep-img').src = data.thumb_landscape || data.thumb_portrait;
                    
                    const nextUrl = `player.html?id=${id}&ep=${currentEpIndex + 1}`;
                    document.getElementById('next-ep-btn-card').onclick = () => window.location.href = nextUrl;
                    
                    const nextBtnBottom = document.getElementById('next-btn-bottom');
                    nextBtnBottom.style.display = 'flex';
                    nextBtnBottom.href = nextUrl;
                }
            } else {
                serverLinks = [
                    data.embed_code || data.video_link || '',
                    data.embed_code2 || data.video_link2 || data.video_link_2 || data.server2 || '',
                    data.embed_code3 || data.video_link3 || data.video_link_3 || data.server3 || ''
                ];
                downloadLink = data.download_link;
            }

            // Clean up empty server links
            serverLinks = serverLinks.filter(link => link && link.trim() !== '');

            // Populate Meta
            document.getElementById('dynamic-meta').style.display = 'flex';
            document.getElementById('meta-subheading').textContent = subheading;
            document.getElementById('meta-title').textContent = displayTitle;
            document.getElementById('meta-desc').textContent = description;
            
            const year = data.publish_date ? new Date(data.publish_date).getFullYear() : '2026';
            document.getElementById('meta-badges').innerHTML = `
                <div class="badge">${year}</div>
                <div class="badge">A</div>
                <div class="badge">18+</div>
                <div class="badge">HD</div>
                <div class="badge">5.1</div>
            `;

            if (downloadLink) {
                const dlBtn = document.getElementById('dl-btn');
                dlBtn.style.display = 'flex';
                dlBtn.href = downloadLink;
                dlBtn.target = '_blank';
            }

            // Setup server selection UI
            if (serverLinks.length > 0) {
                if (serverLinks.length > 1) {
                    const selector = document.getElementById('server-selector');
                    selector.style.display = 'flex';
                    let buttonsHtml = '';
                    serverLinks.forEach((link, idx) => {
                        buttonsHtml += `<button class="server-btn ${idx === 0 ? 'active' : ''}" data-idx="${idx}">Server ${idx + 1}</button>`;
                    });
                    selector.innerHTML = buttonsHtml;
                    
                    selector.querySelectorAll('.server-btn').forEach(btn => {
                        btn.addEventListener('click', (e) => {
                            selector.querySelectorAll('.server-btn').forEach(b => b.classList.remove('active'));
                            e.target.classList.add('active');
                            const idx = parseInt(e.target.getAttribute('data-idx'));
                            loadVideo(serverLinks[idx]);
                        });
                    });
                }
                loadVideo(serverLinks[0]);
            } else {
                document.getElementById('video-target').innerHTML = '<div style="color:#e57373; position:absolute; top:50%; left:50%; transform:translate(-50%,-50%);">No video available.</div>';
            }

            function loadVideo(embedCode) {
                // Cleanup existing player if any
                if (window.plyrPlayer) { window.plyrPlayer.destroy(); window.plyrPlayer = null; }
                if (window.hls) { window.hls.destroy(); window.hls = null; }

                if (embedCode && embedCode.trim() !== '') {
                    let finalEmbed = embedCode.trim();
                    let isDirectVideo = false;

                    if (!finalEmbed.startsWith('<')) {
                        if (finalEmbed.includes('youtube.com/watch?v=')) {
                            try {
                                const videoId = new URL(finalEmbed).searchParams.get('v');
                                if (videoId) finalEmbed = `https://www.youtube.com/embed/${videoId}`;
                            } catch(e) {}
                        } else if (finalEmbed.includes('youtu.be/')) {
                            const videoId = finalEmbed.split('youtu.be/')[1]?.split('?')[0];
                            if (videoId) finalEmbed = `https://www.youtube.com/embed/${videoId}`;
                        }
                        
                        let posterUrl = data.thumb_landscape || data.thumb_portrait || '';
                        let videoType = '';
                        const lowerEmbed = finalEmbed.toLowerCase();
                        if (lowerEmbed.includes('.m3u8')) videoType = 'type="application/x-mpegURL"';
                        else if (lowerEmbed.includes('.mp4')) videoType = 'type="video/mp4"';
                        else if (lowerEmbed.includes('.webm')) videoType = 'type="video/webm"';
                        else if (lowerEmbed.includes('.ogg')) videoType = 'type="video/ogg"';
                        else if (lowerEmbed.includes('.mkv')) videoType = 'type="video/webm"';

                        if (finalEmbed.match(/\.(mp4|webm|ogg|mkv|m3u8)$/i) || finalEmbed.includes('.mp4') || finalEmbed.includes('.m3u8')) {
                            isDirectVideo = true;
                            // Added preload="none" to prevent thundering herd bandwidth spikes on load
                            finalEmbed = `<video id="main-video" preload="none" playsinline controls data-poster="${posterUrl}" style="width: 100%; height: 100%; object-fit: contain; background: #000;">
                                            <source src="${finalEmbed}" ${videoType} />
                                          </video>`;
                        } else {
                            finalEmbed = `<iframe src="${finalEmbed}" allowfullscreen allow="fullscreen" style="width: 100%; height: 100%; border: none;"></iframe>`;
                        }
                    }

                    document.getElementById('video-target').innerHTML = finalEmbed;

                    if (isDirectVideo) {
                        const video = document.getElementById('main-video');
                        const source = video.querySelector('source').src;
                        const defaultOptions = {
                            controls: ['play-large', 'play', 'progress', 'current-time', 'mute', 'volume', 'captions', 'settings', 'pip', 'airplay', 'fullscreen'],
                            settings: ['captions', 'quality', 'speed', 'loop']
                        };

                        if (source.includes('.m3u8') && typeof Hls !== 'undefined' && Hls.isSupported()) {
                            let hlsConfig = {
                                maxMaxBufferLength: 30, // Limit forward buffer to save bandwidth
                                enableWorker: true
                            };

                            let p2pEngine = null;
                            if (typeof p2pml !== 'undefined' && p2pml.hlsjs.Engine.isSupported()) {
                                const swarmId = isSeries && currentEpIndex !== null ? `${id}_ep${currentEpIndex}` : id;
                                p2pEngine = new p2pml.hlsjs.Engine({
                                    segments: {
                                        swarmId: swarmId
                                    }
                                });
                                // Merge P2P config with HLS.js config
                                hlsConfig = Object.assign(hlsConfig, p2pEngine.createHlsJsConfig());
                            }

                            const hls = new Hls(hlsConfig);
                            if (p2pEngine) {
                                p2pEngine.initHlsJsPlayer(hls);
                            }

                            hls.loadSource(source);
                            hls.attachMedia(video);
                            window.hls = hls;

                            hls.on(Hls.Events.MANIFEST_PARSED, function (event, data) {
                                const availableQualities = hls.levels.map((l) => l.height);
                                defaultOptions.quality = {
                                    default: availableQualities[0],
                                    options: availableQualities,
                                    forced: true,
                                    onChange: (e) => updateQuality(e),
                                };
                                window.plyrPlayer = new Plyr(video, defaultOptions);
                            });

                            function updateQuality(newQuality) {
                                window.hls.levels.forEach((level, levelIndex) => {
                                    if (level.height === newQuality) {
                                        window.hls.currentLevel = levelIndex;
                                    }
                                });
                            }
                        } else {
                            window.plyrPlayer = new Plyr(video, defaultOptions);
                        }
                    }
                } else {
                    document.getElementById('video-target').innerHTML = '<div style="color:#e57373; position:absolute; top:50%; left:50%; transform:translate(-50%,-50%);">No video available.</div>';
                }
            }

            // Like Button Dummy
            const likeBtn = document.getElementById('like-btn');
            if (likeBtn) {
                likeBtn.addEventListener('click', () => {
                    const icon = document.getElementById('like-icon');
                    if (icon.getAttribute('fill') === 'none') {
                        icon.setAttribute('fill', 'currentColor');
                        likeBtn.style.color = 'var(--accent-red)';
                        icon.setAttribute('stroke', 'var(--accent-red)');
                    } else {
                        icon.setAttribute('fill', 'none');
                        likeBtn.style.color = 'white';
                        icon.setAttribute('stroke', 'currentColor');
                    }
                });
            }

            // Share Button
            const shareBtn = document.getElementById('share-btn');
            if (shareBtn) {
                shareBtn.addEventListener('click', () => {
                    if (navigator.share) {
                        navigator.share({
                            title: document.title,
                            url: window.location.href
                        }).catch(console.error);
                    } else {
                        navigator.clipboard.writeText(window.location.href);
                        const originalText = shareBtn.innerHTML;
                        shareBtn.innerHTML = '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 12"></polyline></svg> Copied';
                        setTimeout(() => shareBtn.innerHTML = originalText, 2000);
                    }
                });
            }
        });


    </script>
