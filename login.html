 class="login-body">


    
    <div class="login-card">
        <a href="index.html" class="logo login-logo">
            <img src="https://i.ibb.co/S4mxsbrc/Chat-GPT-Image-Jun-7-2026-02-04-20-PMG.png" alt="HEART BEAT" class="logo-img">
        </a>
        <h1 class="login-title">Admin Access</h1>
        <p class="login-subtitle">Please enter your credentials to continue.</p>

        <div id="error-msg" class="error-msg">Invalid email or password.</div>

        <form id="login-form" class="login-form">
            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" placeholder="example1@email.com" required>
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <div style="position: relative; display: flex; align-items: center;">
                    <input type="password" id="password" placeholder="••••••••" required style="width: 100%; padding-right: 40px;">
                    <span id="toggle-password" style="position: absolute; right: 10px; cursor: pointer; user-select: none;">👁️</span>
                </div>
            </div>
            <button type="submit" class="btn btn-primary login-btn">
                <span>🔒</span> Login to Dashboard
            </button>
        </form>
    </div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.49.4/dist/umd/supabase.js"></script>
    <script src="supabase-config.js?v=1781308664460"></script>
    <script src="script.js?v=1781307879671"></script>
    <script>
        // Redirect if already logged in - wait for Supabase session to initialize
        auth.ready.then(session => {
            if (session) {
                window.location.href = 'admin.html';
            }
        });

        const loginForm = document.getElementById('login-form');
        const errorMsg = document.getElementById('error-msg');
        const loginBtn = loginForm.querySelector('button[type="submit"]');
        const togglePassword = document.getElementById('toggle-password');
        const passwordInput = document.getElementById('password');

        togglePassword.addEventListener('click', function () {
            const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
            passwordInput.setAttribute('type', type);
            this.textContent = type === 'password' ? '👁️' : '🙈';
        });

        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();

            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;

            // Show loading state
            loginBtn.disabled = true;
            loginBtn.innerHTML = '<span>⏳</span> Signing in...';
            errorMsg.style.display = 'none';

            try {
                const result = await auth.login(email, password);
                if (result.success) {
                    loginBtn.innerHTML = '<span>✅</span> Success! Redirecting...';
                    window.location.href = 'admin.html';
                } else {
                    errorMsg.textContent = '❌ ' + result.message;
                    errorMsg.style.display = 'block';
                    loginBtn.disabled = false;
                    loginBtn.innerHTML = '<span>🔒</span> Login to Dashboard';
                    document.getElementById('password').value = '';
                }
            } catch (err) {
                console.error('Login exception:', err);
                errorMsg.textContent = '❌ Exception: ' + err.message;
                errorMsg.style.display = 'block';
                loginBtn.disabled = false;
                loginBtn.innerHTML = '<span>🔒</span> Login to Dashboard';
            }
        });
    </script>
