<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Please interact with the advertisement to proceed to your destination.">
    <title>Gateway - Continue to Destination</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/ad-gate/style.css">
</head>
<body>
    <div class="theme-toggle">
        <button id="theme-btn" aria-label="Toggle Theme">
            <svg id="moon-icon" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg>
            <svg id="sun-icon" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display: none;"><circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line></svg>
        </button>
    </div>

    <div class="gateway-container glass-panel">
        <div class="header-section">
            <h1 id="status-title">Action Required</h1>
            <p id="status-message">Please click the advertisement to continue.</p>
        </div>

        <div class="ad-wrapper" id="ad-wrapper">
            <!-- Ad container overlay to help track focus/clicks -->
            <div id="ad-click-detector"></div>
            <div class="ad-container" id="ad-container">
                <script>
                    const adOptions = [
                        '<a href="https://www.effectivecpmnetwork.com/a08cd8r4?key=3e0b4a77e2a1c886647bf60843b854ac" target="_blank" rel="noopener noreferrer"><img src="https://i.ibb.co/1YJ19pSh/Chat-GPT-Image-Jun-15-2026-12-58-54-PM.png" alt="Series Update App Download" width="468" height="60" style="display:block;border:0;max-width:100%;height:auto;"></a>',
                        `<script>
  atOptions = {
    'key' : '41381acd9cf7f2701d35aa2372c93a8f',
    'format' : 'iframe',
    'height' : 60,
    'width' : 468,
    'params' : {}
  };
<\\/script>
<script src="https://www.highperformanceformat.com/41381acd9cf7f2701d35aa2372c93a8f/invoke.js"><\\/script>`
                    ];
                    const selectedAd = adOptions[Math.floor(Math.random() * adOptions.length)];
                    document.write(selectedAd);
                </script>
            </div>
            <div class="success-animation" id="success-animation">
                <svg viewBox="0 0 52 52" class="checkmark">
                    <circle cx="26" cy="26" r="25" fill="none" class="checkmark-circle"/>
                    <path fill="none" d="M14.1 27.2l7.1 7.2 16.7-16.8" class="checkmark-check"/>
                </svg>
            </div>
        </div>

        <div class="progress-section" id="progress-section" style="display: none;">
            <div class="progress-bar-bg">
                <div class="progress-bar-fill" id="progress-bar-fill"></div>
            </div>
            <p class="countdown-text" id="countdown-text">Waiting for action...</p>
        </div>

        <div class="action-section" style="display: none;">
            <button id="continue-btn" class="btn btn-disabled" disabled>
                Continue
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="5" y1="12" x2="19" y2="12"></line><polyline points="12 5 19 12 12 19"></polyline></svg>
            </button>
        </div>
    </div>

    <script src="/ad-gate/script.js"></script>
</body>
</html>
